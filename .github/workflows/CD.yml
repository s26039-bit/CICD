name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-demo

jobs:
  deploy:
    name: Deploy to School Server
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && 
       github.event.workflow_run.conclusion == 'success' && 
       github.event.workflow_run.head_branch == 'main') || 
      (github.event_name == 'workflow_dispatch')

    steps:
      - name: 📥 코드 체크아웃 (docker-compose.yml 사용)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: 🚀 SSH로 서버 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            echo "📂 배포 디렉토리 이동"
            cd ~/cicd-demo || (mkdir -p ~/cicd-demo && cd ~/cicd-demo)

            echo "🔐 Docker Hub 로그인"
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "⬇️ 최신 이미지 Pull"
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            echo "🔄 컨테이너 재시작 (무중단)"
            DOCKER_IMAGE=${{ env.DOCKER_IMAGE }} \
            IMAGE_TAG=latest \
            docker compose up -d --remove-orphans

            echo "🧹 사용하지 않는 이미지 정리"
            docker image prune -f

            echo "✅ 배포 완료!"
            docker ps --filter "name=cicd-demo"
