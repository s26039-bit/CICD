name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-demo

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      # Docker 이미지 태그/라벨 자동 생성
      - name: 🏷️ Docker 메타데이터 설정
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # QEMU + Buildx: 멀티 플랫폼 빌드 지원
      - name: 🔧 QEMU 설정
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🐳 Docker 이미지 빌드 & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}   # main 브랜치만 Push
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha        # GitHub Actions 캐시 활용
          cache-to: type=gha,mode=max
